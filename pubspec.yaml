  a complete design token set to eliminate deep widget nesting.
version: 0.2.0
homepage: https://github.com/nickdemari/tailwind_flutter
repository: https://github.com/nickdemari/tailwind_flutter
issue_tracker: https://github.com/nickdemari/tailwind_flutter/issues
topics:
  - tailwind
  - design-tokens
  - styling
  - theme
  - utility

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0
